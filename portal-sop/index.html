<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal SOP HSC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body{background:#f3f7fb;color:#0f172a}.card{background:#fff;border:1px solid #dbe5f2;border-radius:24px;box-shadow:0 8px 28px rgba(15,23,42,.06)}
    .field{width:100%;border:1px solid #cbd5e1;border-radius:16px;padding:.8rem 1rem;background:#fff}
    .field:focus{outline:none;border-color:#0f766e;box-shadow:0 0 0 4px rgba(15,118,110,.12)}
    .drawer{transition:transform .25s ease}.fade{animation:fade .25s ease}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  </style>
</head>
<body class="h-screen overflow-hidden">
  <div class="flex h-full">
    <aside class="hidden w-80 flex-col border-r border-slate-200 bg-white md:flex">
      <div class="border-b border-slate-100 p-6">
        <div class="flex items-center gap-4">
          <div class="rounded-2xl bg-teal-700 p-3 text-white"><i class="fa-solid fa-book"></i></div>
          <div>
            <p class="text-xs font-black uppercase tracking-[0.3em] text-teal-700">HSC Hub</p>
            <h1 class="text-xl font-black">Portal SOP</h1>
          </div>
        </div>
        <p class="mt-4 text-sm text-slate-500">Setiap SOP bisa dibuka, diubah, ditambah, dihapus, lalu disimpan langsung di browser.</p>
      </div>
      <div class="p-4">
        <button onclick="goHome()" class="w-full rounded-2xl bg-slate-900 px-4 py-3 text-sm font-black text-white">Dashboard Utama</button>
      </div>
      <nav id="sidebar-nav" class="flex-1 space-y-2 overflow-y-auto px-4 pb-4"></nav>
      <div class="border-t border-slate-100 bg-slate-50 p-4 text-sm text-slate-600" id="storage-status"></div>
    </aside>

    <main class="flex-1 overflow-hidden">
      <header class="flex items-center justify-between border-b border-slate-200 bg-white px-4 py-4 md:px-8">
        <div>
          <p class="text-xs font-black uppercase tracking-[0.28em] text-teal-700">Zero Latency Portal</p>
          <h2 id="page-title" class="text-xl font-black">Dashboard SOP</h2>
        </div>
        <div class="flex gap-2">
          <button onclick="openEditor()" class="rounded-2xl bg-teal-700 px-4 py-2 text-sm font-black text-white">Tambah SOP</button>
          <button onclick="exportAll()" class="rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm font-black">Ekspor</button>
        </div>
      </header>
      <div id="main-content" class="h-[calc(100%-81px)] overflow-y-auto p-4 md:p-8"></div>
    </main>
  </div>

  <aside id="editor" class="drawer fixed inset-y-0 right-0 z-30 flex w-full max-w-2xl translate-x-full flex-col border-l border-slate-200 bg-white shadow-2xl">
    <div class="flex items-center justify-between border-b border-slate-100 px-6 py-5">
      <div>
        <p class="text-xs font-black uppercase tracking-[0.28em] text-teal-700">Editor</p>
        <h3 id="editor-title" class="text-xl font-black">Tambah SOP</h3>
      </div>
      <button onclick="closeEditor()" class="rounded-xl bg-slate-100 px-3 py-2"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="flex-1 overflow-y-auto px-6 py-6">
      <div class="space-y-4">
        <input id="f-id" class="field" placeholder="ID SOP, contoh: manajemen">
        <input id="f-title" class="field" placeholder="Judul SOP">
        <div class="grid gap-4 md:grid-cols-2">
          <input id="f-icon" class="field" placeholder="Ikon, contoh: fa-briefcase">
          <select id="f-color" class="field">
            <option>blue</option><option>emerald</option><option>amber</option><option>purple</option>
            <option>orange</option><option>indigo</option><option>rose</option><option selected>teal</option>
          </select>
        </div>
        <textarea id="f-goal" class="field min-h-24" placeholder="Tujuan SOP"></textarea>
        <textarea id="f-kpi" class="field min-h-24" placeholder="KPI target"></textarea>
        <div>
          <div class="mb-2 flex items-center justify-between">
            <label class="text-sm font-bold">Protokol</label>
            <button onclick="addProtocol()" class="rounded-xl border border-slate-200 px-3 py-2 text-xs font-black" type="button">Tambah</button>
          </div>
          <div id="protocol-list" class="space-y-3"></div>
        </div>
        <div>
          <div class="mb-2 flex items-center justify-between">
            <label class="text-sm font-bold">Sub Bagian SOP</label>
            <button onclick="addSubsection()" class="rounded-xl border border-slate-200 px-3 py-2 text-xs font-black" type="button">Tambah</button>
          </div>
          <div id="subsection-list" class="space-y-4"></div>
        </div>
      </div>
    </div>
    <div class="border-t border-slate-100 bg-slate-50 px-6 py-4">
      <div class="flex flex-wrap gap-2">
        <button onclick="saveSOP()" class="rounded-2xl bg-teal-700 px-4 py-3 text-sm font-black text-white">Simpan</button>
        <button id="delete-btn" onclick="deleteSOP()" class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-black text-rose-700">Hapus</button>
        <button onclick="resetDefault()" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-black">Reset Default</button>
      </div>
    </div>
  </aside>

  <script>
    const STORE = "hsc-sop-portal-v3";
    const DEFAULT_DATA = {
      manajemen:{title:"SOP Divisi Manajemen",icon:"fa-briefcase",color:"blue",goal:"Mengawal arah strategis dan koordinasi lintas divisi.",protocols:["Kebijakan baru wajib berbasis data mingguan.","Rapat koordinasi tiap Senin pukul 08:00 WIB maksimal 45 menit."],kpi:"Pertumbuhan pelanggan minimal 5% per kuartal."},
      keuangan:{title:"SOP Divisi Keuangan",icon:"fa-wallet",color:"emerald",goal:"Menjaga arus kas dan disiplin penagihan.",protocols:["Invoice dikirim H-7 sebelum jatuh tempo.","Pengadaan perangkat membandingkan minimal 3 vendor."],kpi:"Akurasi laporan 100% dan piutang bermasalah nol."},
      administrasi:{title:"SOP Divisi Administrasi",icon:"fa-folder-open",color:"amber",goal:"Dokumen dan arsip selalu tertata dan cepat ditemukan.",protocols:["Semua surat didigitalisasi dalam kurang dari 4 jam.","Pendataan aset diperbarui mingguan."],kpi:"Temu kembali dokumen kurang dari 2 menit."},
      operasional:{title:"SOP Divisi Operasional",icon:"fa-server",color:"purple",goal:"Menjaga layanan internet aktif dan terpantau.",protocols:["NOC memantau NMS 24/7.","Gangguan backbone harus men-trigger notifikasi lapangan kurang dari 5 menit."],kpi:"Uptime jaringan 99.9%."},
      teknisi:{title:"SOP Divisi Teknisi",icon:"fa-tools",color:"orange",goal:"Pekerjaan lapangan cepat, rapi, dan sesuai standar.",protocols:["Survei lokasi memastikan redaman sesuai standar.","Aktivasi diverifikasi sampai kecepatan sesuai paket."],subsections:[{subtitle:"Sub-SOP Instalasi",items:["Gunakan klem dan protection sleeve.","Hindari jalur kabel yang berisiko."]},{subtitle:"Sub-SOP Troubleshooting",items:["Isolasi gangguan dari core ke pelanggan.","Gunakan OTDR untuk pencarian titik putus."]}],kpi:"Penanganan putus FO kurang dari 60 menit."},
      knowledge:{title:"Knowledge Base",icon:"fa-book-atlas",color:"indigo",goal:"Repositori teknis internal yang terus diperbarui.",protocols:["Queue Tree dipakai untuk prioritas trafik tertentu.","Firmware OLT selalu pada versi stabil."],kpi:"Dokumentasi teknis selalu mutakhir."}
    };

    const C = {
      blue:["bg-blue-50","border-blue-200","text-blue-600"], emerald:["bg-emerald-50","border-emerald-200","text-emerald-600"],
      amber:["bg-amber-50","border-amber-200","text-amber-600"], purple:["bg-purple-50","border-purple-200","text-purple-600"],
      orange:["bg-orange-50","border-orange-200","text-orange-600"], indigo:["bg-indigo-50","border-indigo-200","text-indigo-600"],
      rose:["bg-rose-50","border-rose-200","text-rose-600"], teal:["bg-teal-50","border-teal-200","text-teal-600"]
    };

    let data = {};
    let current = "home";
    let editing = null;
    let chart = null;

    function init() {
      data = JSON.parse(localStorage.getItem(STORE) || "null") || structuredClone(DEFAULT_DATA);
      saveLocal();
      renderNav();
      goHome();
    }

    function saveLocal() {
      localStorage.setItem(STORE, JSON.stringify(data));
      document.getElementById("storage-status").textContent = `Tersimpan ${Object.keys(data).length} SOP di browser ini.`;
    }

    function goHome() {
      current = "home";
      document.getElementById("page-title").textContent = "Dashboard SOP";
      renderNav();
      renderHome();
    }

    function renderNav() {
      const html = Object.entries(data).map(([id,item]) => `
        <button onclick="openSOP('${id}')" class="w-full rounded-2xl border px-4 py-3 text-left ${current===id?'border-teal-200 bg-teal-50':'border-transparent bg-white hover:border-slate-200'}">
          <div class="flex items-center gap-3">
            <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-slate-100"><i class="fa-solid ${item.icon||'fa-file-lines'}"></i></div>
            <div class="min-w-0">
              <div class="truncate text-sm font-black">${item.title}</div>
              <div class="text-[11px] uppercase tracking-[0.2em] text-slate-400">${id}</div>
            </div>
          </div>
        </button>`).join("");
      document.getElementById("sidebar-nav").innerHTML = html;
    }

    function renderHome() {
      const totalProtocols = Object.values(data).reduce((a,b)=>a+(b.protocols?.length||0),0);
      const totalSubs = Object.values(data).reduce((a,b)=>a+(b.subsections?.length||0),0);
      document.getElementById("main-content").innerHTML = `
        <div class="mx-auto max-w-7xl space-y-6 fade">
          <section class="card p-8">
            <span class="rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-black uppercase tracking-[0.25em]">Portal Update SOP</span>
            <h3 class="mt-4 text-3xl font-black md:text-5xl">Kelola setiap SOP dari satu halaman.</h3>
            <p class="mt-4 max-w-3xl text-slate-600">Halaman ini sudah disempurnakan agar tiap SOP bisa diperbarui sendiri. Anda bisa tambah SOP baru, ubah isi protokol, tambah sub bagian, duplikat, hapus, lalu ekspor datanya.</p>
          </section>
          <section class="grid gap-4 md:grid-cols-3">
            ${card("Total SOP",Object.keys(data).length,"fa-layer-group")}
            ${card("Total Protokol",totalProtocols,"fa-list-check")}
            ${card("Sub Bagian",totalSubs,"fa-diagram-project")}
          </section>
          <section class="grid gap-6 xl:grid-cols-[1.5fr,1fr]">
            <div class="card p-6"><div class="mb-4 text-lg font-black">Ringkasan Konten SOP</div><div class="h-[320px]"><canvas id="chart"></canvas></div></div>
            <div class="card p-6">
              <div class="mb-4 text-lg font-black">Daftar SOP</div>
              <div class="space-y-3">
                ${Object.entries(data).map(([id,item])=>`<button onclick="openSOP('${id}')" class="w-full rounded-2xl border border-slate-200 bg-white p-4 text-left hover:bg-slate-50"><div class="text-sm font-black">${item.title}</div><div class="mt-1 text-xs text-slate-500">${item.protocols?.length||0} protokol</div></button>`).join("")}
              </div>
            </div>
          </section>
        </div>`;
      renderChart();
    }

    function card(label,value,icon){return `<div class="card p-6"><div class="flex items-center justify-between"><div><div class="text-xs font-black uppercase tracking-[0.25em] text-slate-400">${label}</div><div class="mt-3 text-3xl font-black">${value}</div></div><div class="rounded-2xl bg-slate-100 p-4"><i class="fa-solid ${icon}"></i></div></div></div>`}

    function renderChart() {
      if (chart) chart.destroy();
      const ctx = document.getElementById("chart");
      if (!ctx) return;
      chart = new Chart(ctx, {
        type:"bar",
        data:{labels:Object.values(data).map(v=>v.title.slice(0,18)),datasets:[{data:Object.values(data).map(v=>(v.protocols?.length||0)+(v.subsections?.length||0)*2),backgroundColor:["#0f766e","#0284c7","#10b981","#8b5cf6","#f97316","#4f46e5"],borderRadius:10}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}
      });
    }

    function openSOP(id) {
      current = id;
      renderNav();
      const item = data[id];
      const [bg,border,text] = C[item.color] || C.teal;
      document.getElementById("page-title").textContent = item.title;
      document.getElementById("main-content").innerHTML = `
        <div class="mx-auto max-w-6xl space-y-6 fade">
          <section class="card p-8">
            <div class="grid gap-6 md:grid-cols-[1.4fr,0.8fr]">
              <div>
                <div class="mb-5 flex items-start gap-4">
                  <div class="flex h-16 w-16 items-center justify-center rounded-3xl ${bg} border ${border}"><i class="fa-solid ${item.icon||'fa-file-lines'} text-2xl ${text}"></i></div>
                  <div><div class="rounded-full border border-slate-200 px-3 py-1 text-xs font-black uppercase">${id}</div><h3 class="mt-3 text-3xl font-black">${item.title}</h3></div>
                </div>
                <p class="text-slate-600">${item.goal||"-"}</p>
              </div>
              <div class="flex flex-col gap-3">
                <button onclick="openEditor('${id}')" class="rounded-2xl bg-slate-900 px-4 py-3 text-sm font-black text-white">Edit SOP Ini</button>
                <button onclick="duplicateSOP('${id}')" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-black">Duplikat SOP</button>
                <button onclick="exportSingle('${id}')" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-black">Ekspor SOP Ini</button>
              </div>
            </div>
          </section>
          <section class="grid gap-6 xl:grid-cols-[1.35fr,0.75fr]">
            <div class="card p-8"><div class="mb-5 text-lg font-black">Protokol</div>${(item.protocols||[]).map((p,i)=>`<div class="mb-3 flex gap-3 rounded-2xl bg-slate-50 p-4"><div class="flex h-8 w-8 items-center justify-center rounded-xl bg-white text-xs font-black">${i+1}</div><p class="text-sm text-slate-700">${p}</p></div>`).join("") || `<p class="text-sm text-slate-500">Belum ada protokol.</p>`}</div>
            <div class="space-y-6">
              <div class="card p-8"><div class="text-xs font-black uppercase tracking-[0.25em] text-slate-400">KPI Target</div><div class="mt-4 rounded-3xl ${bg} border ${border} p-5 text-sm font-semibold">${item.kpi||"-"}</div></div>
            </div>
          </section>
          ${(item.subsections||[]).length?`<section class="card p-8"><div class="mb-5 text-lg font-black">Sub Bagian SOP</div><div class="grid gap-4 md:grid-cols-2">${item.subsections.map(s=>`<div class="rounded-3xl border border-slate-200 p-6"><h4 class="font-black">${s.subtitle}</h4><ul class="mt-4 space-y-3">${(s.items||[]).map(v=>`<li class="flex gap-3 text-sm text-slate-600"><i class="fa-solid fa-circle-check mt-1 ${text}"></i><span>${v}</span></li>`).join("")}</ul></div>`).join("")}</div></section>`:""}
        </div>`;
    }

    function openEditor(id=null) {
      editing = id;
      const item = id ? data[id] : {icon:"fa-file-lines",color:"teal",protocols:[""],subsections:[]};
      document.getElementById("editor-title").textContent = id ? `Edit SOP: ${item.title}` : "Tambah SOP";
      document.getElementById("f-id").value = id || "";
      document.getElementById("f-id").disabled = !!id;
      document.getElementById("f-title").value = item.title || "";
      document.getElementById("f-icon").value = item.icon || "";
      document.getElementById("f-color").value = item.color || "teal";
      document.getElementById("f-goal").value = item.goal || "";
      document.getElementById("f-kpi").value = item.kpi || "";
      document.getElementById("delete-btn").style.display = id ? "inline-flex" : "none";
      document.getElementById("protocol-list").innerHTML = "";
      document.getElementById("subsection-list").innerHTML = "";
      (item.protocols?.length ? item.protocols : [""]).forEach(addProtocol);
      (item.subsections||[]).forEach(addSubsection);
      document.getElementById("editor").classList.remove("translate-x-full");
    }

    function closeEditor(){document.getElementById("editor").classList.add("translate-x-full")}

    function addProtocol(value="") {
      const row = document.createElement("div");
      row.className = "flex gap-3";
      row.innerHTML = `<textarea class="field protocol min-h-24" placeholder="Isi protokol SOP">${value}</textarea><button type="button" onclick="this.parentElement.remove()" class="rounded-xl bg-rose-50 px-3 text-rose-600"><i class="fa-solid fa-trash"></i></button>`;
      document.getElementById("protocol-list").appendChild(row);
    }

    function addSubsection(dataSub={subtitle:"",items:[""]}) {
      const wrap = document.createElement("div");
      wrap.className = "rounded-3xl border border-slate-200 bg-slate-50 p-4";
      wrap.innerHTML = `<div class="mb-3 flex gap-3"><input class="field subtitle" placeholder="Judul sub bagian" value="${dataSub.subtitle||""}"><button type="button" onclick="this.closest('.rounded-3xl').remove()" class="rounded-xl bg-rose-50 px-3 text-rose-600"><i class="fa-solid fa-trash"></i></button></div><div class="items space-y-3"></div><button type="button" class="mt-3 rounded-xl border border-slate-200 bg-white px-3 py-2 text-xs font-black add-item">Tambah Item</button>`;
      document.getElementById("subsection-list").appendChild(wrap);
      const items = wrap.querySelector(".items");
      (dataSub.items?.length ? dataSub.items : [""]).forEach(v => addSubItem(items, v));
      wrap.querySelector(".add-item").onclick = () => addSubItem(items, "");
    }

    function addSubItem(container, value="") {
      const row = document.createElement("div");
      row.className = "flex gap-3";
      row.innerHTML = `<textarea class="field subitem min-h-20" placeholder="Isi item">${value}</textarea><button type="button" onclick="this.parentElement.remove()" class="rounded-xl bg-rose-50 px-3 text-rose-600"><i class="fa-solid fa-trash"></i></button>`;
      container.appendChild(row);
    }

    function collectForm() {
      return {
        id: document.getElementById("f-id").value.trim().toLowerCase().replace(/\s+/g,"-"),
        item: {
          title: document.getElementById("f-title").value.trim(),
          icon: document.getElementById("f-icon").value.trim() || "fa-file-lines",
          color: document.getElementById("f-color").value,
          goal: document.getElementById("f-goal").value.trim(),
          kpi: document.getElementById("f-kpi").value.trim(),
          protocols: [...document.querySelectorAll(".protocol")].map(v=>v.value.trim()).filter(Boolean),
          subsections: [...document.querySelectorAll("#subsection-list > div")].map(box=>({
            subtitle: box.querySelector(".subtitle").value.trim(),
            items: [...box.querySelectorAll(".subitem")].map(v=>v.value.trim()).filter(Boolean)
          })).filter(v=>v.subtitle||v.items.length)
        }
      };
    }

    function saveSOP() {
      const {id,item} = collectForm();
      if (!id || !item.title) return alert("ID SOP dan Judul wajib diisi.");
      if (!editing && data[id]) return alert("ID SOP sudah dipakai.");
      data[id] = item;
      saveLocal();
      renderNav();
      closeEditor();
      openSOP(id);
    }

    function deleteSOP() {
      if (!editing) return;
      if (!confirm(`Hapus SOP "${editing}"?`)) return;
      delete data[editing];
      saveLocal();
      renderNav();
      closeEditor();
      goHome();
    }

    function duplicateSOP(id) {
      let next = `${id}-copy`, n = 2;
      while (data[next]) { next = `${id}-copy-${n}`; n++; }
      data[next] = structuredClone(data[id]);
      data[next].title += " (Salinan)";
      saveLocal();
      renderNav();
      openSOP(next);
    }

    function exportAll(){download("hsc-sop-data.json", data)}
    function exportSingle(id){download(`${id}.json`, {[id]:data[id]})}
    function download(name,obj){const blob=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)}

    function resetDefault() {
      if (!confirm("Reset semua SOP ke data default?")) return;
      data = structuredClone(DEFAULT_DATA);
      saveLocal();
      renderNav();
      closeEditor();
      goHome();
    }

    window.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
